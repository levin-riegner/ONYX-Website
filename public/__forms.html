<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Forms</title>
	</head>
	<body>
		<!-- Netlify Forms detection - must match Contact/Hero/Form (FORM_NAME + field names) -->
		<form name="Website Enquiry" data-netlify="true" hidden>
			<input type="hidden" name="form-name" value="Website Enquiry" />
			<input name="Name" type="text" />
			<input name="Email" type="email" />
			<textarea name="Message"></textarea>
		</form>
	</body>
</html>
